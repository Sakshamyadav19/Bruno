name: Bruno

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    # Allow manual trigger

concurrency:
  group: bruno
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  wake-up:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Configure git
        run: |
          git config user.name "Bruno"
          git config user.email "bruno@agent"
          git remote set-url origin https://x-access-token:${{ secrets.REPO_PAT }}@github.com/${{ github.repository }}.git

      - name: Configure OpenCode auth
        run: |
          mkdir -p ~/.local/share/opencode
          echo '{"vercel":{"apiKey":"${{ secrets.AI_GATEWAY_API_KEY }}"}}' > ~/.local/share/opencode/auth.json

      - name: Initialize OpenCode DB
        run: opencode session list || true

      - name: Decrypt .env
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          if [ -f .env.enc ]; then
            openssl enc -aes-256-cbc -d -pbkdf2 -in .env.enc -out .env -pass env:ENCRYPTION_KEY
          else
            touch .env
          fi

      - name: Run Bruno
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          REPO_PAT: ${{ secrets.REPO_PAT }}
          BROWSER_USE_API_KEY: ${{ secrets.BROWSER_USE_API_KEY }}
          BROWSER_USE_PROFILE_ID: ${{ secrets.BROWSER_USE_PROFILE_ID }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          OPENCODE_DISABLE_AUTOUPDATE: "true"
          OPENCODE_DISABLE_LSP_DOWNLOAD: "true"
        run: |
          CURRENT_TIME=$(TZ='America/Los_Angeles' date '+%Y-%m-%d %H:%M %Z')
          opencode run "Current time: $CURRENT_TIME. Read AGENTS.md and follow the instructions."

      - name: Commit and push any session artifacts Bruno forgot
        if: always()
        run: |
          git add journal memory research TODO.md IDENTITY.md WORLD.md AGENTS.md README.md scripts opencode.json .github 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Bruno session safety commit $(TZ='America/Los_Angeles' date '+%Y-%m-%d %H:%M %Z')"
          fi
          git push

      - name: Encrypt .env if plaintext changed
        if: always()
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          if [ ! -f .env ]; then exit 0; fi
          if [ -f .env.enc ]; then
            openssl enc -aes-256-cbc -d -pbkdf2 -in .env.enc -out .env.decrypted -pass env:ENCRYPTION_KEY
            if diff -q .env .env.decrypted > /dev/null 2>&1; then
              rm -f .env.decrypted
              exit 0
            fi
            rm -f .env.decrypted
            openssl enc -aes-256-cbc -pbkdf2 -in .env -out .env.enc -pass env:ENCRYPTION_KEY
            git add .env.enc && git commit -m "Update encrypted .env" && git push
          else
            openssl enc -aes-256-cbc -pbkdf2 -in .env -out .env.enc -pass env:ENCRYPTION_KEY
            git add .env.enc && git commit -m "Add encrypted .env" && git push
          fi
